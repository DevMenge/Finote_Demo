<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station Login | Finote</title>


<link rel="stylesheet" href="css/style.css">


</head>
<body>

<div class="auth-page">

    <div class="auth-card">

        <a href="index.html" class="logo">
            FINOTE
        </a>

        <h1>Station Portal Login</h1>

        <p>
            Access your station dashboard and manage fuel availability.
        </p>

        <form>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="manager@ola.com">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Enter password">
            </div>

            <button type="button" class="btn-primary">
                Login
            </button>

        </form>

        <div class="auth-footer">
            <p>
                Don't have access?
                <a href="station-register.html">
                    Register Station
                </a>
            </p>
        </div>

    </div>

</div>


</body>
</html>
