<!DOCTYPE html>

<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የማደያ መቆጣጠሪያ ሰሌዳ | ፍኖት</title>


<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/dashboard.css">


</head>
<body>

<div class="dashboard-layout">


<!-- Sidebar -->
<aside class="sidebar">

    <div class="sidebar-logo">
        <a href="index.html" class="logo">
            FINOTE
        </a>
    </div>

    <nav>

        <a href="#" class="active">
            🏠 ዋና መቆጣጠሪያ
        </a>

        <a href="#">
            ⛽ የነዳጅ ሁኔታ
        </a>

        <a href="#">
            💰 የነዳጅ ዋጋ
        </a>

        <a href="#">
            📍 የማደያ መረጃ
        </a>

        <a href="#">
            📊 ሪፖርቶች
        </a>

        <a href="#">
            🚪 ውጣ
        </a>

    </nav>

</aside>

<!-- Main Content -->
<main class="dashboard-content">

    <div class="page-header">

        <h1>
            ኦላ ቦሌ ነዳጅ ማደያ
        </h1>

        <p>
            የነዳጅ መጠን፣ ዋጋ እና የማደያ መረጃዎችን ያስተዳድሩ።
        </p>

    </div>

    <!-- Statistics -->
    <section class="stats-grid">

        <div class="stat-card">
            <div class="stat-icon">⛽</div>
            <h3>4</h3>
            <p>የሚገኙ አገልግሎቶች</p>
        </div>

        <div class="stat-card">
            <div class="stat-icon">👥</div>
            <h3>248</h3>
            <p>ዛሬ የተገለገሉ ደንበኞች</p>
        </div>

        <div class="stat-card">
            <div class="stat-icon">🕒</div>
            <h3>5 ደቂቃ</h3>
            <p>የመጨረሻ ዝማኔ</p>
        </div>

    </section>

    <!-- Fuel Status -->
    <section class="dashboard-card">

        <h2>
            ⛽ የነዳጅ ሁኔታ
        </h2>

        <div class="dashboard-grid">

            <div class="fuel-card">
                <label>ቤንዚን</label>

                <select>
                    <option>አለ</option>
                    <option>አነስተኛ ክምችት</option>
                    <option>አልቋል</option>
                </select>
            </div>

            <div class="fuel-card">
                <label>ናፍጣ</label>

                <select>
                    <option>አለ</option>
                    <option>አነስተኛ ክምችት</option>
                    <option>አልቋል</option>
                </select>
            </div>

            <div class="fuel-card">
                <label>ኬሮሲን</label>

                <select>
                    <option>አነስተኛ ክምችት</option>
                    <option>አለ</option>
                    <option>አልቋል</option>
                </select>
            </div>

            <div class="fuel-card">
                <label>የኤሌክትሪክ ኃይል</label>

                <select>
                    <option>ንቁ</option>
                    <option>ዝግ</option>
                </select>
            </div>

        </div>

    </section>

    <!-- Fuel Prices -->
    <section class="dashboard-card">

        <h2>
            💰 የነዳጅ ዋጋዎች
        </h2>

        <div class="dashboard-grid">

            <div class="fuel-card">
                <label>የቤንዚን ዋጋ (ብር)</label>
                <input type="number" value="85">
            </div>

            <div class="fuel-card">
                <label>የናፍጣ ዋጋ (ብር)</label>
                <input type="number" value="82">
            </div>

        </div>

    </section>

    <!-- Station Information -->
    <section class="dashboard-card">

        <h2>
            📍 የማደያ መረጃ
        </h2>

        <div class="dashboard-grid">

            <div class="fuel-card">
                <label>የማደያ ስም</label>
                <input type="text" value="ኦላ ቦሌ ነዳጅ ማደያ">
            </div>

            <div class="fuel-card">
                <label>አድራሻ</label>
                <input type="text" value="ቦሌ መንገድ">
            </div>

            <div class="fuel-card">
                <label>ስልክ ቁጥር</label>
                <input type="text" value="+251911111111">
            </div>

            <div class="fuel-card">
                <label>የሥራ ሰዓት</label>
                <input type="text" value="24 ሰዓት">
            </div>

        </div>

    </section>

    <!-- Save -->
    <div class="save-section">

        <button class="btn-primary save-btn">
            💾 ለውጦችን አስቀምጥ
        </button>

    </div>

</main>

</div>

<script src="js/dashboard.js"></script>

</body>
</html>
