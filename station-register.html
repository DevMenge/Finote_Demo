<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station Registration | Finote</title>

```
<link rel="stylesheet" href="css/style.css">
```

</head>
<body>

```
<div class="auth-page">

    <div class="register-card">

        <a href="index.html" class="logo">
            FINOTE
        </a>

        <h1>Station Verification Request</h1>

        <p>
            Submit your station information for administrator verification.
        </p>

        <form>

            <div class="form-group">
                <label>Station Manager Name</label>
                <input type="text" placeholder="Full Name">
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="manager@ola.com">
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" placeholder="+251...">
            </div>

            <div class="form-group">
                <label>Employee ID</label>
                <input type="text" placeholder="OLA-12345">
            </div>

            <div class="form-group">
                <label>Station Name</label>
                <input type="text" placeholder="OLA Bole Station">
            </div>

            <div class="form-group">
                <label>Upload Company ID</label>
                <input type="file">
            </div>

            <div class="form-group">
                <label>Upload Authorization Letter</label>
                <input type="file">
            </div>

            <button type="button" class="btn-primary">
                Submit Verification Request
            </button>

        </form>

    </div>

</div>
```

</body>
</html>
